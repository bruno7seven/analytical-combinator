[mod-name]
analytical-combinator=Analytical combinators

[mod-description]
analytical-combinator=Adds a programmable combinator that executes a RISC-V inspired assembly language. Read circuit signals from red and green input wires, perform arithmetic and branching, and emit up to four output signals per tick.

[mod-setting-name]
analytical-combinator-dev-mode=Enable dev mode

[mod-setting-description]
analytical-combinator-dev-mode=Gives the player some starting analytical combinators and poles for testing

[entity-name]
analytical-combinator=Analytical combinator

[entity-description]
analytical-combinator=A miniature programmable processor built into a circuit combinator. Write assembly programs using instructions like ADDI, WSIG, RSIGG, BNE and WAIT to read input signals, compute values, and drive the output circuit network with precision timing.

