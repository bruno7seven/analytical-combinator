[technology-name]
analytical-combinators=Analytical combinators

[technology-description]
analytical-combinators=Unlock a new class of circuit logic: a combinator you can program in assembly language. Use instructions, registers, labels and branches to implement threshold gates, counters, signal routers and timed sequencers that would require dozens of conventional combinators to replicate.

